# SwiftLint configuration for swift-ast-lint

excluded:
  - .build
  - .swiftpm
  - "**/.build/**"
  - "**/.swiftpm/**"

included:
  - Sources
  - Tests
  - Package.swift

opt_in_rules:
  - force_unwrapping
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_parameters
  - non_optional_string_data_conversion
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - prohibited_super_call
  - redundant_type_annotation
  - sorted_first_last
  - switch_case_alignment
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  - trailing_comma
  - opening_brace
  - modifier_order
  - trailing_whitespace
  - vertical_whitespace
  - colon
  - void_return
  - comma
  - prefer_self_in_static_references
  - redundant_nil_coalescing

force_unwrapping:
  severity: warning

function_body_length:
  warning: 50
  error: 80

line_length:
  warning: 120
  error: 200
  ignores_urls: true
  ignores_comments: false
  ignores_interpolated_strings: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 600
  error: 1000

identifier_name:
  min_length: 3
  max_length: 40
  excluded:
    - id
    - to

type_name:
  min_length: 3
  max_length: 50

nesting:
  type_level: 3
  function_level: 4

cyclomatic_complexity:
  warning: 10
  error: 15

function_parameter_count:
  warning: 5
  error: 8

large_tuple:
  warning: 3
  error: 4

enum_case_associated_values_count:
  warning: 6
  error: 7

custom_rules:
  deep_nesting_control_flow:
    regex: '^ {16,}(if |guard |for |while |switch )'
    message: "Control flow nested 4+ levels deep. Extract a helper function to reduce nesting."
    severity: error

  url_file_url_with_path:
    regex: 'URL\(fileURLWithPath:'
    message: "Use URL(filePath:directoryHint:) instead of URL(fileURLWithPath:isDirectory:)."
    severity: warning

  no_raw_print:
    regex: '^\s*print\s*\('
    message: "Use logger or Diagnostic output instead of print()."
    severity: warning
    excluded:
      - ".*/Package\\.swift"

  no_legacy_synchronization:
    regex: '\bDispatchQueue\b|\bNSLock\b|\bNSRecursiveLock\b|\bos_unfair_lock\b'
    message: "Use actor / Swift Concurrency instead of DispatchQueue, NSLock, NSRecursiveLock, or os_unfair_lock."
    severity: error
